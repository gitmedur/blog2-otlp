apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: iris-otel-runtime
  namespace: iris
  annotations:
    openshift.io/display-name: "Iris OpenTelemetry Runtime"
    opendatahub.io/dashboard: "true"
    opendatahub.io/serving-runtime-scope: "namespace"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  disabled: false
  multiModel: false
  protocolVersions:
    - v2
  supportedModelFormats:
    - name: sklearn-otel
      version: "1"
      autoSelect: false
      priority: 1
  containers:
    - name: kserve-container
      # REPLACE with the image that you build and push.
      image: image-registry.openshift-image-registry.svc:5000/iris/iris-otel-runtime:1.0
      imagePullPolicy: Always
      args:
        - --model-name={{.Name}}
        - --model-dir=/mnt/models
        - --http-port=8080
      env:
        - name: MODEL_DIR
          value: /mnt/models
        - name: OTEL_SERVICE_NAME
          value: iris-otel-runtime
        - name: OTEL_SERVICE_NAMESPACE
          value: iris
        - name: SERVICE_VERSION
          value: "1.0.0"
        - name: DEPLOYMENT_ENVIRONMENT
          value: openshift-ai
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector.tempo-demo.svc.cluster.local:4317
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        - name: OTEL_TRACES_SAMPLER
          value: parentbased_traceidratio
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "1.0"
        - name: OTEL_PYTHON_FASTAPI_EXCLUDED_URLS
          value: "/v2/health/live,/v2/health/ready,/v2/models/.*/ready"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      ports:
        - name: h2c
          containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
